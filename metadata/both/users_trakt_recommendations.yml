###########################
#        Templates        #
###########################
external_templates:
  repo: metadata/mytemplates.yml
  default: templates  

templates:
  recommended_content:
#    sort_title: "zzz_✨ Nouveau ! ✨ <<user>>, voici les films et séries tv recommandés pour toi"
    sort_title: "zzz_Nouveau ! <<user>>, voici les films et séries tv recommandés pour toi"
    summary: "<<user>>, bienvenue dans tes recommandations personnalisées ! Cette collection de films et séries tv a été soigneusement sélectionnée en fonction de ton historique de visionnage et des notes que tu as données. Prépare-toi à découvrir une sélection sur mesure, parfaitement adaptée à tes goûts."
    conditionals:
      recommended_label:
        default: Recommended_Movies_<<user>>
        conditions:
          - library_type: show
            value: Recommended_Shows_<<user>>
          - library_type: movie
            value: Recommended_Movies_<<user>>
    smart_filter:
      sort_by: title.asc
      any:
        label: <<recommended_label>>
    limit: 40 
    url_poster: https://raw.githubusercontent.com/PierreDurrr/pmm-images/refs/heads/master/both/Mes%20Recommandations.jpg
#    collection_order: custom
    collection_mode: show_items
    delete_below_minimum: false
    visible_shared: true
    visible_library: true
    sync_mode: sync
    label:
      - REPLEXHERO
      - <<trakt_user>>

  recommended_anime:
    sort_title: "zzz_Nouveau ! <<user>>, voici les animes recommandés pour toi"
    summary: "<<user>>, bienvenue dans tes recommandations personnalisées !..."
    smart_filter:
      sort_by: random
      any:
        label: Recommended_anime_<<user>>
    limit: 40
    url_poster: https://raw.githubusercontent.com/PierreDurrr/pmm-images/refs/heads/master/both/Mes%20Recommandations.jpg
    collection_mode: show_items
    delete_below_minimum: false
    visible_shared: false
    visible_library: true
    sync_mode: sync
#    filters:
#      genre.not: Sport
    label:
      - REPLEXHERO
      - <<trakt_user>>

