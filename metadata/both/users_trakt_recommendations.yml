###########################
#        Templates        #
###########################
external_templates:
  repo: metadata/mytemplates.yml
  default: templates  

templates:
  recommended_content:
#    sort_title: "zzz_✨ Nouveau ! ✨ <<user>>, voici les films et séries tv recommandés pour toi"
    sort_title: "zzz_Nouveau ! <<user>>, voici les films et séries tv recommandés pour toi"
    summary: "<<user>>, bienvenue dans tes recommandations personnalisées ! Cette collection de films et séries tv a été soigneusement sélectionnée en fonction de ton historique de visionnage et des notes que tu as données. Prépare-toi à découvrir une sélection sur mesure, parfaitement adaptée à tes goûts."
    smart_label: title.asc
    conditionals:
      trakt_url:
#        default: https://trakt.tv/users/<<trakt_user>>/lists/movies-based-on-recently-watched-couchmoney-tv?sort=random,asc
        default: https://trakt.tv/users/<<trakt_user>>/lists/recommended-movies-<<user>>?sort=random,asc
        conditions:
          - library_type: show
            value: https://trakt.tv/users/<<trakt_user>>/lists/recommended-shows-<<user>>?sort=random,asc
          - library_type: movie
            value: https://trakt.tv/users/<<trakt_user>>/lists/recommended-movies-<<user>>?sort=random,asc
      trakt_url_no_anime:
        default: https://trakt.tv/users/<<trakt_user>>/lists/recommended-movies-no-anime-<<user>>?sort=random,asc
        conditions:
          - library_type: show
            value: https://trakt.tv/users/<<trakt_user>>/lists/recommended-shows-no-anime-<<user>>?sort=random,asc
          - library_type: movie
            value: https://trakt.tv/users/<<trakt_user>>/lists/recommended-movies-no-anime-<<user>>?sort=random,asc
    trakt_list: 
      - <<trakt_url>>
      - <<trakt_url_no_anime>>
#    plex_all: false
    limit: 40 
    url_poster: https://raw.githubusercontent.com/PierreDurrr/pmm-images/refs/heads/master/both/Mes%20Recommandations.jpg
#    collection_order: custom
    collection_mode: show_items
    delete_below_minimum: false
    visible_shared: true
    visible_library: true
    sync_mode: sync
    label:
      - REPLEXHERO
      - <<trakt_user>>


  recommended_anime:
    sort_title: "zzz_Nouveau ! <<user>>, voici les animes recommandés pour toi"
    summary: "<<user>>, bienvenue dans tes recommandations personnalisées ! Cette collection d'animes a été soigneusement sélectionnée en fonction de ton historique de visionnage et des notes que tu as données. Prépare-toi à découvrir une sélection sur mesure, parfaitement adaptée à tes goûts."
    smart_filter:
      sort_by: title.asc
      all:
        label: Recommended_anime_<<user>>
        year.gte: 2000
    limit: 40
    url_poster: https://raw.githubusercontent.com/PierreDurrr/pmm-images/refs/heads/master/both/Mes%20Recommandations.jpg
    collection_mode: show_items
    delete_below_minimum: false
    visible_shared: false
    visible_library: true
    sync_mode: sync
#    filters:
#      genre.not: Sport
    label:
      - REPLEXHERO
      - <<trakt_user>>

###################################################################################################################################

