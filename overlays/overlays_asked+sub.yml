templates:
  SUBTITLED:
    conditionals:
      builder_level:
        default: ""
        conditions:
          - library_type: show
            value: episode
      font_size:
        default: 65
        conditions:
          - library_type: show
            value: 80
      back_width:
        default: 380
        conditions:
          - library_type: show
            value: 420
    overlay:
      name: text(Sous-titré)
      horizontal_offset: 10
      horizontal_align: left
      vertical_offset: 10
      vertical_align: top
      weight: 10
      font: fonts/Inter-Bold.ttf
      font_size: <<font_size>>
      font_color: "#FFFFFF"
      back_color: "#00000099"
      back_radius: 30
      back_width: <<back_width>>
      back_height: 105

overlays:
  Subtitled:
    template:
      - name: SUBTITLED
    plex_all: true
    filters:
      filepath.regex: '(?i)(vostfr|vastfr|vost|fastsub|subfrench|subtitled|multisub|fansub)'
      filepath.not:
        - Les.Robins.Des.Bois.La.Cape.Et.L.EpĂ©e.Tome
        - Ez3kiel
        - Birdy Nam Nam live a la Cigale
        - VOF
        - VF
        - vf

